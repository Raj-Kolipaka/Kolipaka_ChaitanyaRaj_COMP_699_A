{% extends "base.html" %}

{% block content %}

<div class="dashboard-container">

    <h2>Loan Management</h2>

    <!-- CREATE LOAN -->
    <div class="section">

        <h3>Create Loan</h3>

        <form action="/create_loan" method="POST" class="form-inline">

            <input type="number" name="principal" placeholder="Loan Amount" required>

            <input type="number" step="0.01" name="interest_rate" placeholder="Interest Rate (%)" required>

            <input type="number" name="emi" placeholder="EMI Amount" required>

            <button type="submit">Create Loan</button>

        </form>

    </div>


    <!-- LOAN DETAILS -->
    <div class="section">

        <h3>Loan Details</h3>

        {% if loan %}

            <div class="card-container">

                <div class="card">
                    <h4>Principal</h4>
                    <p>₹ {{ loan.principal }}</p>
                </div>

                <div class="card">
                    <h4>Balance</h4>
                    <p>₹ {{ loan.balance }}</p>
                </div>

                <div class="card">
                    <h4>Total Paid</h4>
                    <p>₹ {{ loan.total_paid }}</p>
                </div>

            </div>

            <!-- EMI ACTION -->
            <div class="action-box">
                <a href="/pay_emi" class="pay-btn">Mark EMI Paid</a>
            </div>

        {% else %}
            <p>No loan created yet</p>
        {% endif %}

    </div>

</div>

{% endblock %}
